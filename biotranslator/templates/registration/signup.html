<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BioTranslator | Sign Up</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .signup-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        h2 { margin-top: 0; color: #2c3e50; text-align: center; }
        form p { margin-bottom: 15px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; border: 1px solid #dfe6e9; border-radius: 4px; box-sizing: border-box; }
        .btn { width: 100%; background-color: #27ae60; color: white; padding: 12px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        .btn:hover { background-color: #219150; }
        .login-link { text-align: center; margin-top: 15px; font-size: 0.9rem; }
        .login-link a { color: #3498db; text-decoration: none; }
    </style>
</head>
<body>

<div class="signup-container">
    <h2>Create Account</h2>
    <form method="POST">
        {% csrf_token %}
        
        <!-- Django automatically generates the input fields and validation labels here -->
        {{ form.as_p }}
        
        <button type="submit" class="btn">Sign Up</button>
    </form>
    
    <div class="login-link">
        Already have an account? <a href="{% url 'login' %}">Log In</a>
    </div>
</div>

</body>
</html>
